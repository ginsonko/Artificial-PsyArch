# ======================================================================
# AP 情绪管理器配置（EMgr, Emotion Manager）与递质通道（NT, NeuroTransmitter channels）
# AP Emotion Manager (EMgr) configuration
#
# 本文件既供 EmotionManager.reload_config() 热加载，
# 也作为观测台“设置”页的字段说明来源。
#
# 注：界面与注释尽量中文优先；出现简写（EMgr/NT/DA/COR 等）时请附中文全称。
# ======================================================================

# enabled / 总开关
enabled: true

# global_decay_ratio / 全局衰减系数
# 作用（Purpose）: 若通道未单独指定 decay_ratio，则使用该值。
global_decay_ratio: 0.94

# soft_cap_enabled / 是否启用“软上限”极限算法
# 作用（Purpose）: 让数值“无限逼近上限但不达到”，避免轻易打满（爆表）导致调制失去区分度。
# 意义（Meaning）:
#   - 当通道值接近 max 时，正向增量的有效增幅会越来越小（渐近），从而只能逼近 max。
#   - 这比简单 clamp 更平滑，也更利于长期运行的稳定调制。
soft_cap_enabled: true

# soft_cap_eps / 上限 epsilon（永远不达到 max）
# 说明：若 max=1.0，则实际最大值为 1.0 - eps
soft_cap_eps: 0.000001

# soft_cap_k_default / 软上限强度参数（默认）
# 说明：k 越大，“越接近线性”；k 越小，“越容易饱和”。该值单位与 delta（通道增量）一致。
soft_cap_k_default: 0.35

# nt_channels / 通道定义（min/max/decay_ratio）
# 字段说明：
# - base: 基准值/基线值（Baseline）。衰减会“回归”到 base，而不是回归到 0。
# - soft_cap_k: 可选，覆盖 soft_cap_k_default（对该通道单独调节饱和速度）。
nt_channels:
  DA: { min: 0.0, max: 1.0, decay_ratio: 0.94, base: 0.0, soft_cap_k: 0.35 }
  ADR: { min: 0.0, max: 1.0, decay_ratio: 0.92, base: 0.0, soft_cap_k: 0.35 }
  OXY: { min: 0.0, max: 1.0, decay_ratio: 0.95, base: 0.0, soft_cap_k: 0.35 }
  SER: { min: 0.0, max: 1.0, decay_ratio: 0.96, base: 0.0, soft_cap_k: 0.35 }
  END: { min: 0.0, max: 1.0, decay_ratio: 0.93, base: 0.0, soft_cap_k: 0.35 }
  COR: { min: 0.0, max: 1.0, decay_ratio: 0.90, base: 0.0, soft_cap_k: 0.35 }

# cfs_to_nt_gains / CFS -> NT 通道增益映射（delta = strength * coef）
cfs_to_nt_gains:
  dissonance: { COR: 0.28, ADR: 0.06 }
  correct_event: { DA: 0.30, OXY: 0.18, SER: 0.08 }
  surprise: { ADR: 0.35 }
  expectation: { DA: 0.12 }
  pressure: { COR: 0.30, END: 0.12, ADR: 0.08 }
  # 期待/压力验证态（对齐理论 3.8.2）：验证/不验不是二极管，而是连续渐变对抗。
  # 这些信号用于让 EMgr 也能“感到验证/落空”的差异，从而影响递质通道。
  expectation_verified: { DA: 0.18, SER: 0.06 }
  expectation_unverified: { COR: 0.08, ADR: 0.04 }
  pressure_verified: { COR: 0.18, ADR: 0.10, END: 0.04 }
  pressure_unverified: { END: 0.10, COR: -0.05, SER: 0.03 }
  complexity: { ADR: 0.08 }
  repetition: { COR: 0.10 }
  grasp: { SER: 0.10 }

# cfs_to_rwd_pun / CFS -> 奖励/惩罚汇总（用于审计/后续 Drive 驱动力模块）
cfs_to_rwd_pun:
  correct_event: { rwd: 1.0, pun: 0.0 }
  pressure: { rwd: 0.0, pun: 0.8 }
  dissonance: { rwd: 0.0, pun: 0.3 }

# rwd_pun_source_mode / 奖励-惩罚信号（Rwd/Pun）来源模式
# 说明：
# - pool（推荐）：从状态池对象的“绑定属性 + EV/ER 关系”自然汇总（更贴近理论 3.8.2/3.9）
# - cfs（过渡/对照）：从 CFS(kind) 做硬映射汇总（使用上面的 cfs_to_rwd_pun）
#
# 注意：EMgr（情绪管理器）本身不直接读取 StatePool（状态池），因此当使用 pool 模式时，
# 需要上层（Observatory）在每个 tick 把计算结果通过 rwd_pun_override 传入 update_emotion_state()。
rwd_pun_source_mode: pool

# rwd_pun_to_nt_gains / Rwd/Pun -> NT 通道增益映射（delta = value * coef）
# 目的（对齐理论 3.9.3）：
# - 即便没有显式生成 expectation CFS，只要 reward_signal 获得 ER（现实验证），全局 Rwd 也应推动 DA 上升；
# - 同理 Pun 应推动 COR/ADR 等“警戒/唤醒”通道变化。
#
# 说明：
# - rwd/pun 的取值通常已被上层（Observatory）软饱和到 0~1，因此这里系数无需过大。
# - 允许出现负系数（表示“抑制/下降”），但建议保持小幅，避免震荡。
rwd_pun_to_nt_gains:
  rwd: { DA: 0.18, OXY: 0.06, SER: 0.03 }
  pun: { COR: 0.16, ADR: 0.06, END: 0.04 }

# rwd_pun_pool_aggregation / pool 汇总参数（由上层计算时使用，EMgr 只透传/展示）
# 汇总逻辑（简述）：
# - 预测项：对“带 reward_signal/punish_signal 的对象”累加 EV（虚能量/预测能量）
# - 验证项：对“带 reward_signal/punish_signal 的对象”累加 max(0, ΔER)（实能量上升）
# - 然后对两项分别做软饱和 softcap(x)=x/(x+k)，再按权重混合并 clamp 到 0~1
rwd_pun_pool_aggregation:
  reward_attr_name: reward_signal
  punish_attr_name: punish_signal
  ev_min: 0.0
  # softcap parameters / 软饱和参数（k 越大越“线性”，越小越“易饱和”）
  k_pred: 1.0
  k_got: 0.5
  # blend weights / 混合权重（会自动归一化）
  w_pred: 0.7
  w_got: 0.3

# modulation / 调制输出（原型阶段先对 attention 注意力过滤器生效）
modulation:
  attention:
    base_top_n: 16
    adr_topn_gain: 6
    cor_topn_suppress: 2
    base_priority_weight_cp_abs: 0.35
    cor_cp_weight_gain: 0.20
    ser_cp_weight_suppress: 0.10
    base_priority_weight_fatigue: 0.00
    cor_fatigue_weight_gain: 0.25
    base_min_total_energy: 0.0
  # hdb / HDB 调制输出（对齐理论 3.9.2：情绪递质应调制学习力度与能量传播系数）
  # 输出口径：提供“缩放系数 scale”，由上层（Observatory）在下一 tick 应用到 HDB 配置：
  #   effective_value = base_value * scale
  #
  # 注意：scale 会被 clamp 到 [clamp_min, clamp_max]，避免极端调制导致系统不稳定。
  hdb:
    clamp_min: 0.40
    clamp_max: 2.50
    scales:
      # base_weight_er_gain / 实验证增强基础权重
      # - DA 高 -> 学习更积极（gain 更大）
      # - COR/SER 高 -> 更保守/更稳定（gain 更小）
      base_weight_er_gain: { base: 1.00, da_gain: 0.90, cor_suppress: 0.35, ser_suppress: 0.20 }
      # base_weight_ev_wear / 虚循环磨损基础权重
      # - COR 高 -> 对“纯虚重复”更警惕（wear 更大）
      # - DA 高 -> 更愿意探索/容忍（wear 略降低）
      base_weight_ev_wear: { base: 1.00, cor_gain: 0.80, da_suppress: 0.20 }
      # ev_propagation_ratio / 虚能量传播预算比例（想象/联想扩散强度）
      ev_propagation_ratio: { base: 1.00, da_gain: 0.60, adr_gain: 0.35, cor_suppress: 0.35, ser_suppress: 0.20 }
      # ev_propagation_threshold / 虚能量传播阈值（越低越容易扩散）
      ev_propagation_threshold: { base: 1.00, cor_gain: 0.55, da_suppress: 0.25, ser_gain: 0.20 }
      # er_induction_ratio / 实能量诱发比例（现实触发的结构/记忆赋能强度）
      er_induction_ratio: { base: 1.00, adr_gain: 0.45, da_gain: 0.20, cor_suppress: 0.15 }

# ---- Logging / 日志 ----
log_dir: ""
log_max_file_bytes: 5242880
stdout_fallback_when_log_fail: true
