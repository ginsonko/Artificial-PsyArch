# AP Episode Dataset: smoke_100_v0
# Quick regression dataset (about 100 ticks when expanded)
#
# Design goals:
# - Cover basic punctuation / repetition / empty ticks / mixed language / noise
# - Provide a deterministic, small, and fast batch input set for headless runner
# - Avoid external dependencies (tool calls, network, large corpora)

dataset_id: smoke_100_v0
seed: 20260418

# time_basis:
# - tick: headless runner should advance "virtual time" by tick_dt_ms per tick
# - wallclock: headless runner should use real time (not recommended for reproducible experiments)
time_basis: tick
tick_dt_ms: 100

episodes:
  - id: ep_boot_greeting_minimal
    tags: [bootstrap, greeting]
    repeat: 6
    ticks:
      - text: "你好"
      - text: "你好!"
      - text: "你好呀!"
      - empty: true

  - id: ep_punct_variants
    tags: [punctuation]
    repeat: 4
    ticks:
      - text: "你好!"
      - text: "你好!!"
      - text: "你好?"
      - text: "你好..."
      - empty: true

  - id: ep_mixed_language
    tags: [mixed_language]
    repeat: 3
    ticks:
      - text: "Hello 你好 mixed"
      - text: "你好 Hello"
      - empty: true

  - id: ep_noise_injection_long_tail
    tags: [noise]
    repeat: 3
    ticks:
      - text: "???!"
      - empty: true
      - text: "……"
      - empty: true

  # Simple "sequence order" probe.
  # Note: actual order-sensitive structure behavior depends on sensor echo and downstream matching.
  - id: ep_sequence_order_ab
    tags: [sequence, echo]
    repeat: 5
    ticks:
      - text: "A B"
      - empty: true
      - text: "B A"
      - empty: true

  # Add a controlled empty tick gap to exercise decay / time sensor buckets without huge runtime.
  - id: ep_decay_gap
    tags: [empty, decay]
    repeat: 15
    ticks:
      - empty: true

