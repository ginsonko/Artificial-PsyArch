# ======================================================================
# AP State Pool configuration
# AP 状态池运行配置
#
# This file is both the StatePool hot-reload source and the annotation
# source used by the Observatory settings panel.
# 本文件既供 StatePool.reload_config() 热加载，也作为观测台设置页的字段说明来源。
# ======================================================================

# ---- Capacity / 容量与基础写入 ----

# pool_max_items / 状态池最大对象数
# Purpose / 作用: Hard upper bound for active state items kept in the pool.
# Meaning / 意义: Higher values increase observation breadth but also raise memory use, maintenance cost, and render volume.
# Reference / 参考: Default 5000. Routine debugging usually works well in the 2000-10000 range.
pool_max_items: 5000

# insert_zero_energy_object / 是否允许插入零能对象
# Purpose / 作用: Controls whether objects with ER=0 and EV=0 may still be inserted.
# Meaning / 意义: Useful for testing and placeholder injection, but less meaningful in strict runtime realism.
# Reference / 参考: Default true. Turn off if you want the pool to reject purely empty runtime nodes.
insert_zero_energy_object: true

# allow_negative_energy / 是否允许负能量
# Purpose / 作用: Controls whether ER or EV is allowed to go below zero after updates.
# Meaning / 意义: Negative energy is usually undesirable in the current prototype and may break intuition when inspecting reports.
# Reference / 参考: Default false. Keep false unless you are explicitly testing signed-energy variants.
allow_negative_energy: false

# energy_update_floor_to_zero / 更新后是否截断到零
# Purpose / 作用: Floors ER and EV to zero when an update would otherwise push them negative.
# Meaning / 意义: This keeps the current energy interpretation simple and prevents underflow-like drift.
# Reference / 参考: Default true. Strongly recommended when negative energy is disabled.
energy_update_floor_to_zero: true

# tick_time_floor_ms / Tick 时间差最小值
# Purpose / 作用: Minimum time delta used when computing rates to avoid divide-by-zero behavior.
# Meaning / 意义: This only affects rate estimation, not the ER/EV values themselves.
# Reference / 参考: Default 1 ms. Leave as-is unless a custom clock needs a different safety floor.
tick_time_floor_ms: 1

# ---- Runtime Modulation / 近因增益与疲劳 ----

# recency_gain_peak / 近因增益上限
# Purpose / 作用: Peak Grecency written into a state item when it is newly created or explicitly re-activated.
# Meaning / 意义: This is the StatePool-side short-term real-time weight boost. In the current theory-aligned setup it should jump high after a fresh activation, then gradually decay back toward 1.
# Suggested / 建议: Default 10.0. Use together with recency_gain_decay_ratio if you want the classic “rise to 10x, then slowly fall back to 1x” waveform.
recency_gain_peak: 10.0

# recency_gain_hold_ticks / 近因增益保持 Tick 数
# Purpose / 作用: Number of maintenance ticks the peak Grecency is held before decay starts.
# Meaning / 意义: This models the short “high plateau” stage in the theory recency waveform.
# Suggested / 建议: Default 2. Raise it only if you want a visibly longer peak-hold phase.
recency_gain_hold_ticks: 2

# recency_gain_decay_ratio / 近因增益每 Tick 保留系数
# Purpose / 作用: Multiplicative retention ratio applied to recency gain after the hold stage.
# Meaning / 意义: Values closer to 1 decay more slowly; recency gain is always floored back to 1.0 and never drops below it.
# Suggested / 建议: Default 0.9999976974. This makes 10x recency decay back near 1x over roughly 1,000,000 ticks. For a shorter ~100,000-tick tail, use about 0.9999769744.
recency_gain_decay_ratio: 0.9999976974

# fatigue_window_ticks / 疲劳统计窗口 Tick 数
# Purpose / 作用: Sliding window size used to count repeated activations of the same runtime item.
# Meaning / 意义: StatePool fatigue must come from short-time repeated use, not from simple object age.
# Suggested / 建议: Default 12. This is a short-window runtime suppression profile. If you want a slower “100 ticks / threshold 10” style fatigue window, raise this together with fatigue_threshold_count.
fatigue_window_ticks: 12

# fatigue_threshold_count / 疲劳触发阈值次数
# Purpose / 作用: Repeated-activation count inside the fatigue window required before fatigue begins.
# Meaning / 意义: Counts below the threshold keep fatigue at 0, so ordinary sparse activations are not suppressed.
# Suggested / 建议: Default 3. If you raise fatigue_window_ticks to 100, a matching theory-style threshold is often 10.
fatigue_threshold_count: 3

# fatigue_max_value / 疲劳最大值
# Purpose / 作用: Upper bound of runtime fatigue.
# Meaning / 意义: 1.0 means fully fatigued inside the StatePool runtime modulation layer; lower values cap the suppression effect.
# Suggested / 建议: Default 1.0. Keep 1.0 if you want sustained repetition to be allowed to saturate the suppression curve.
fatigue_max_value: 1.0

# ---- Decay / 衰减 ----

# default_er_decay_ratio / ER 默认每 Tick 保留系数
# Purpose / 作用: Default multiplicative retention ratio applied to ER during maintenance.
# Meaning / 意义: Higher values preserve real activation longer; lower values clear it faster.
# Reference / 参考: Default 0.95. Typical tuning range is 0.85-0.99.
default_er_decay_ratio: 0.95

# default_ev_decay_ratio / EV 默认每 Tick 保留系数
# Purpose / 作用: Default multiplicative retention ratio applied to EV during maintenance.
# Meaning / 意义: EV usually decays faster than ER in the current prototype to reflect looser predictive persistence.
# Reference / 参考: Default 0.90. Lower it if speculative activation should wash out faster.
default_ev_decay_ratio: 0.9

# ---- Soft Capacity / 软上限衰减调制（资源约束） ----

# soft_capacity_enabled / 是否启用“软上限衰减调制”
# Purpose / 作用: When the pool grows beyond a soft cap, increase decay aggressiveness to self-tighten.
# Meaning / 意义: This is a stability guardrail for prototype runs to avoid uncontrolled pool growth.
# Reference / 参考: Default true.
soft_capacity_enabled: true

# soft_capacity_start_items / 软上限起点（对象数）
# Purpose / 作用: When active_item_count > this value, decay modulation starts to kick in.
# Meaning / 意义: Below this, maintenance decay behaves as the base default_er/default_ev ratios.
# Suggested / 建议: Default 200 (debug-friendly). For broader context, consider 500-2000.
soft_capacity_start_items: 200

# soft_capacity_full_items / 软上限满载点（对象数）
# Purpose / 作用: When active_item_count >= this value, decay modulation reaches the maximum power.
# Meaning / 意义: Between start_items and full_items, decay_power increases linearly.
# Suggested / 建议: Default 400. Keep it > start_items.
soft_capacity_full_items: 400

# soft_capacity_decay_power_max / 最大衰减幂指数（>=1）
# Purpose / 作用: Controls how aggressive the soft-cap decay becomes at full load.
# Meaning / 意义: We use ratio' = ratio ** decay_power. decay_power ranges from 1 -> power_max.
# Example / 例子:
#   base ER ratio=0.95, power_max=30 => 0.95**30≈0.214 (about 79% decay per tick at full load)
#   base EV ratio=0.90, power_max=30 => 0.90**30≈0.042 (about 96% decay per tick at full load)
# Note / 注意:
# - 该参数越大，在“对象数量严重超载”时衰减越激进（更容易把池子压回可控规模）。
# - 若觉得过猛，可降低该值，或把 soft_capacity_full_items 提高（让强衰减更晚触发）。
soft_capacity_decay_power_max: 30.0

# per_object_type_decay_override / 按对象类型覆写衰减
# Purpose / 作用: Optional per-type decay overrides for ER and EV.
# Meaning / 意义: This lets specific runtime object types decay faster or slower than the global defaults.
# Reference / 参考: Default empty dict. Example: action_node: {er: 0.97, ev: 0.92}.
per_object_type_decay_override: {}

# ---- Neutralization / 中和 ----

# enable_neutralization / 是否启用中和
# Purpose / 作用: Turns ER/EV neutralization logic on or off during maintenance or immediate apply stages.
# Meaning / 意义: Neutralization is part of how the current prototype reduces mismatched activation pressure.
# Reference / 参考: Default true. Disable only when isolating raw accumulation behavior.
enable_neutralization: true

# neutralization_mode / 中和模式
# Purpose / 作用: Selects the concrete neutralization strategy.
# Meaning / 意义: Different modes define whether both sides cancel symmetrically or whether only pressure-reducing logic is applied.
# Reference / 参考: Default "simple_min_cancel". Keep this unless you are testing alternative neutralization semantics.
neutralization_mode: "simple_min_cancel"

# neutralization_apply_stage / 中和执行阶段
# Purpose / 作用: Controls when neutralization is applied in the StatePool pipeline.
# Meaning / 意义: "maintenance" keeps it in the normal tick phase; "immediate" applies it as soon as packets land; "both" combines the two.
# Reference / 参考: Default "maintenance". Use "both" only if you explicitly want more aggressive stabilization.
neutralization_apply_stage: "maintenance"

# neutralization_min_effect_threshold / 中和最小生效阈值
# Purpose / 作用: Ignores neutralization effects smaller than this threshold.
# Meaning / 意义: This suppresses tiny noisy events and keeps logs cleaner.
# Reference / 参考: Default 0.01. Lower it for finer-grained observation; raise it to reduce event clutter.
neutralization_min_effect_threshold: 0.01

# enable_priority_stimulus_neutralization / 是否启用优先刺激中和
# Purpose / 作用: Lets full incoming stimulus packets first try to verify or neutralize selected high-pressure state items before normal apply.
# Meaning / 意义: This is the current “缓存中和” related path and changes how much packet energy survives into later stages.
# Reference / 参考: Default true. Keep enabled for the current observatory loop.
enable_priority_stimulus_neutralization: true

# priority_stimulus_target_ref_types / 优先中和目标对象类型
# Purpose / 作用: Restricts which runtime object types may be targeted by priority stimulus neutralization.
# Meaning / 意义: This prevents the early neutralization path from touching every object indiscriminately.
# Reference / 参考: Default ["st"]. Expand only when more object types should participate in this path.
priority_stimulus_target_ref_types: ["st"]

# priority_neutralization_min_effect_threshold / 优先中和最小生效阈值
# Purpose / 作用: Threshold below which priority neutralization events are ignored.
# Meaning / 意义: Keeps the packet-delta diagnostics focused on meaningful verification rather than micro-cancellation.
# Reference / 参考: Default 0.01. Lower for fine debugging, higher for cleaner logs.
priority_neutralization_min_effect_threshold: 0.01

# ---- Pruning / 淘汰 ----

# er_elimination_threshold / ER 淘汰阈值
# Purpose / 作用: Objects below this ER threshold become pruning candidates.
# Meaning / 意义: Combined with EV and CP conditions, this determines when weak items stop occupying space.
# Reference / 参考: Default 0.05. Raise to keep the pool tighter, lower to preserve more weak traces.
er_elimination_threshold: 0.05

# ev_elimination_threshold / EV 淘汰阈值
# Purpose / 作用: Objects below this EV threshold become pruning candidates.
# Meaning / 意义: This works together with the ER threshold and pruning mode.
# Reference / 参考: Default 0.05.
ev_elimination_threshold: 0.05

# cp_elimination_ignore_below / 低认知压忽略阈值
# Purpose / 作用: Below this CP amplitude, cognitive pressure alone will not block pruning.
# Meaning / 意义: This prevents tiny ER/EV differences from keeping otherwise dead objects alive.
# Reference / 参考: Default 0.02.
cp_elimination_ignore_below: 0.02

# prune_if_both_energy_low / 双低能时是否淘汰
# Purpose / 作用: Controls whether an object is pruned when both ER and EV are below their thresholds.
# Meaning / 意义: This is the main fast-cleanup path for weak residual runtime items.
# Reference / 参考: Default true.
prune_if_both_energy_low: true

# pool_overflow_strategy / 容量溢出策略
# Purpose / 作用: Defines what happens when pool_max_items is exceeded.
# Meaning / 意义: Different strategies trade off accepting new items versus preserving existing weak items.
# Reference / 参考: Default "prune_lowest_then_reject". Other expected values include "reject_new" and "prune_lowest_then_insert".
pool_overflow_strategy: "prune_lowest_then_reject"

# ---- Change Tracking / 变化监测 ----

# enable_change_rate_tracking / 是否启用变化率追踪
# Purpose / 作用: Enables per-item rate calculations such as ER change rate, EV change rate, and CP change rate.
# Meaning / 意义: These values are mainly for observability and future script/feeling modules.
# Reference / 参考: Default true.
enable_change_rate_tracking: true

# rate_window_mode / 变化率窗口模式
# Purpose / 作用: Chooses how the elapsed time for rate calculation is measured.
# Meaning / 意义: "last_update" uses the time since the previous item update; "tick_interval" is more tied to tick cadence.
# Reference / 参考: Default "last_update".
rate_window_mode: "last_update"

# fast_cp_rise_threshold / 认知压快速上升阈值
# Purpose / 作用: Threshold for labeling CP amplitude as rising rapidly.
# Meaning / 意义: Mainly influences diagnostics, event labeling, and future hooks rather than core energy math.
# Reference / 参考: Default 0.5.
fast_cp_rise_threshold: 0.5

# fast_cp_drop_threshold / 认知压快速下降阈值
# Purpose / 作用: Threshold for labeling CP change as a rapid drop.
# Meaning / 意义: Negative values indicate downward movement of cognitive pressure.
# Reference / 参考: Default -0.5.
fast_cp_drop_threshold: -0.5

# fast_er_rise_threshold / ER 快速上升阈值
# Purpose / 作用: Threshold for flagging a rapid ER increase.
# Meaning / 意义: Useful for diagnostics when external validation strongly boosts a state item.
# Reference / 参考: Default 0.5.
fast_er_rise_threshold: 0.5

# fast_ev_rise_threshold / EV 快速上升阈值
# Purpose / 作用: Threshold for flagging a rapid EV increase.
# Meaning / 意义: Useful when speculative or projected activation ramps up quickly.
# Reference / 参考: Default 0.5.
fast_ev_rise_threshold: 0.5

# rate_smoothing_alpha / 变化率平滑系数
# Purpose / 作用: Reserved smoothing factor for rate estimation.
# Meaning / 意义: 1.0 means effectively unsmoothed in the current prototype.
# Reference / 参考: Default 1.0. Keep as-is unless you extend the rate engine.
rate_smoothing_alpha: 1.0

# ---- Merge And Reconcile / 合并与对齐 ----

# merge_duplicate_items / 是否合并重复对象
# Purpose / 作用: Enables merging of duplicate runtime items instead of keeping separate pool entries.
# Meaning / 意义: This is essential for avoiding unnecessary pool explosion.
# Reference / 参考: Default true.
merge_duplicate_items: true

# merge_only_same_ref_object / 是否仅按同一 ref_object 合并
# Purpose / 作用: Restricts duplicate merging to items that share the same ref_object_id.
# Meaning / 意义: With semantic merge enabled, this becomes the conservative ID-level merge layer.
# Reference / 参考: Default true.
merge_only_same_ref_object: true

# enable_semantic_same_object_merge / 是否启用语义同一对象合并
# Purpose / 作用: Allows separate runtime items that represent the same semantic object to merge.
# Meaning / 意义: This is important because sensor and projection paths often create new object IDs for semantically identical content.
# Reference / 参考: Default true. Keep enabled in the current prototype.
enable_semantic_same_object_merge: true

# allow_weak_semantic_merge / 是否允许弱语义合并
# Purpose / 作用: Allows a looser merge criterion than exact semantic-signature equality.
# Meaning / 意义: This may reduce duplication further, but it also carries more risk of accidental conflation.
# Reference / 参考: Default false. Keep off unless you are testing fuzzy merge behavior.
allow_weak_semantic_merge: false

# aggregate_same_semantic_incoming_objects / 是否先聚合同包内语义同一对象
# Purpose / 作用: Aggregates semantically identical objects inside one stimulus packet before they hit the pool.
# Meaning / 意义: This prevents same-packet duplicates from being applied multiple times independently.
# Reference / 参考: Default true.
aggregate_same_semantic_incoming_objects: true

# sensor_input_reconcile_mode / 感受器输入对齐模式
# Purpose / 作用: Controls how incoming sensor energy is reconciled against existing pool items.
# Meaning / 意义: "max" treats packet energy as current presence strength instead of always adding on top of existing state.
# Reference / 参考: Default "max". Keep it for the current echo-aware pipeline.
sensor_input_reconcile_mode: "max"

# insert_csa_as_state_item / 是否将 CSA（组合刺激元）写入状态池作为独立对象
# Purpose / 作用: Controls whether CSA bundles from stimulus packets are inserted as standalone runtime state items.
# Meaning / 意义:
# - true: CSA 会作为独立 state_item 出现在状态池中，便于直接观测其聚合视图，但会增加对象数量并引入“SA 与 CSA 同时存在”的展示复杂度。
# - false: CSA 仅作为“绑定/匹配约束信息”存在于 packet/HDB 与锚点对象的绑定状态中（更接近理论语义，且更清爽）。
# Reference / 参考: Default false (recommended for the current prototype).
insert_csa_as_state_item: false

# insert_attribute_sa_as_state_item / 是否将属性 SA 写入状态池作为独立对象
# Purpose / 作用: Controls whether attribute SA (stimulus.role == attribute) from stimulus packets are inserted as standalone runtime items.
# Meaning / 意义:
# - true: 属性 SA 会作为独立 state_item 出现在状态池中，便于观察属性能量，但会产生大量类似 "stimulus_intensity:1.1" 的噪音对象。
# - false: 属性 SA 不入池；它们会被折叠到锚点对象的 binding_state.packet_attribute_by_name 与 ref_snapshot.attribute_displays（推荐，更清爽）。
# Reference / 参考: Default false (recommended for the current prototype).
insert_attribute_sa_as_state_item: false

# ---- Attribute Binding / 属性绑定 ----

# allow_auto_create_csa_on_attribute_bind / 绑定属性时是否自动建 CSA
# Purpose / 作用: When binding an attribute to an SA target, allows the pool to auto-build a CSA wrapper if needed.
# Meaning / 意义: This keeps attribute binding compatible with CSA-centric downstream logic.
# Reference / 参考: Default true.
# Runtime note / 当前实现说明: CSA 在当前原型里主要承担 packet 内部分组、匹配和展示作用，不作为默认运行态 StatePool 对象，因此这里默认关闭自动创建。
allow_auto_create_csa_on_attribute_bind: false

# attribute_bind_deduplicate_by_id / 属性绑定是否按 ID 去重
# Purpose / 作用: Prevents adding the same attribute node repeatedly when its ID matches an existing binding.
# Meaning / 意义: This is the strict deduplication path.
# Reference / 参考: Default true.
attribute_bind_deduplicate_by_id: true

# attribute_bind_deduplicate_by_content / 属性绑定是否按内容去重
# Purpose / 作用: Prevents repeated bindings when attribute content is identical even if IDs differ.
# Meaning / 意义: Stronger deduplication reduces clutter but may hide intentionally separate attribute instances.
# Reference / 参考: Default false.
attribute_bind_deduplicate_by_content: false

# attribute_bind_replace_by_attribute_name / 是否按属性名替换（同名只保留最新）
# Purpose / 作用: When binding runtime attributes, replace older attributes with the same attribute_name.
# Meaning / 意义:
# - true: 同一目标对象上的同名属性只保留最新值（推荐，避免 runtime_attrs 堆叠导致前端难以验收）。
# - false: 允许同名属性累积（仅当你确实需要“同名多实例”时使用）。
# Reference / 参考: Default true.
attribute_bind_replace_by_attribute_name: true

# attribute_binding_supported_target_types / 可绑定属性的目标类型
# Purpose / 作用: Lists the runtime object types that may receive attribute bindings.
# Meaning / 意义: This is an explicit safety gate for future extensibility.
# Reference / 参考: Default ["sa", "csa"].
# Runtime note / 当前实现说明:
# - 当前原型运行态池默认以 ST/SA 为主，因此这里允许对 ST 做属性绑定，用于 CFS 等元认知属性的对接与观测。
attribute_binding_supported_target_types: ["sa", "csa", "st"]

# ---- Script Broadcast / 脚本广播 ----

# enable_script_broadcast / 是否启用脚本广播
# Purpose / 作用: Enables emitting script-check packets from StatePool events.
# Meaning / 意义: Useful for observability and future higher modules, but unnecessary for pure core-loop tests.
# Reference / 参考: Default true.
enable_script_broadcast: true

# script_broadcast_stage_after_apply / Apply 后是否广播
# Purpose / 作用: Emits a script packet right after stimulus apply completes.
# Meaning / 意义: This captures immediate input impact before maintenance changes the pool further.
# Reference / 参考: Default true.
script_broadcast_stage_after_apply: true

# script_broadcast_stage_after_maintenance / 维护后是否广播
# Purpose / 作用: Emits a script packet after maintenance finishes.
# Meaning / 意义: This captures the stabilized post-maintenance state.
# Reference / 参考: Default true.
script_broadcast_stage_after_maintenance: true

# script_broadcast_include_full_event_dump / 是否附带完整事件列表
# Purpose / 作用: Controls whether the broadcast payload includes the full event dump.
# Meaning / 意义: Full dumps improve traceability but make payloads heavier.
# Reference / 参考: Default true.
script_broadcast_include_full_event_dump: true

# script_broadcast_top_k_items / 广播携带的 Top-K 状态项
# Purpose / 作用: Limits how many state items are included in each script packet summary.
# Meaning / 意义: Higher values give more context but increase payload size.
# Reference / 参考: Default 128.
script_broadcast_top_k_items: 128

# script_broadcast_min_event_count / 最少事件数仍广播阈值
# Purpose / 作用: Minimum event count required before a script packet is emitted.
# Meaning / 意义: Raising this can suppress low-signal broadcasts.
# Reference / 参考: Default 1.
script_broadcast_min_event_count: 1

# ---- Placeholder Interfaces / 占位接口 ----

# enable_placeholder_interfaces / 是否启用占位接口
# Purpose / 作用: Master switch for placeholder interfaces reserved for future modules.
# Meaning / 意义: Useful for end-to-end integration testing, but not required for pure current-loop debugging.
# Reference / 参考: Default true.
enable_placeholder_interfaces: true

# placeholder_hdb_enabled / HDB 占位接口开关
# Purpose / 作用: Enables the HDB placeholder interface channel inside StatePool.
# Meaning / 意义: Reserved for extension points and integration checks.
# Reference / 参考: Default true.
placeholder_hdb_enabled: true

# placeholder_script_enabled / 脚本占位接口开关
# Purpose / 作用: Enables the script placeholder interface channel.
# Meaning / 意义: Reserved for future script-side modules.
# Reference / 参考: Default true.
placeholder_script_enabled: true

# placeholder_attention_enabled / 注意力占位接口开关
# Purpose / 作用: Enables the attention placeholder interface channel.
# Meaning / 意义: Reserved for the formal attention module handoff path.
# Reference / 参考: Default true.
placeholder_attention_enabled: true

# placeholder_emotion_enabled / 情绪占位接口开关
# Purpose / 作用: Enables the emotion placeholder interface channel.
# Meaning / 意义: Reserved for future emotion-layer integration.
# Reference / 参考: Default true.
placeholder_emotion_enabled: true

# placeholder_action_enabled / 行动占位接口开关
# Purpose / 作用: Enables the action placeholder interface channel.
# Meaning / 意义: Reserved for future action-layer integration.
# Reference / 参考: Default true.
placeholder_action_enabled: true

# ---- Logging / 日志与历史窗口 ----

# detail_log_dump_full_object / Detail 日志是否写完整对象
# Purpose / 作用: Controls whether detail logs dump full object payloads.
# Meaning / 意义: Helpful for deep debugging, but increases log size substantially.
# Reference / 参考: Default true.
detail_log_dump_full_object: true

# detail_log_dump_change_event / Detail 日志是否写变化事件
# Purpose / 作用: Controls whether detail logs dump full state change events.
# Meaning / 意义: Good for event-level trace reconstruction.
# Reference / 参考: Default true.
detail_log_dump_change_event: true

# history_window_max_events / 历史窗口最大事件数
# Purpose / 作用: Upper bound for recent state-change events kept in the in-memory history window.
# Meaning / 意义: Higher values improve observability but increase memory and payload size.
# Reference / 参考: Default 5000.
history_window_max_events: 5000

# log_dir / 日志目录
# Purpose / 作用: Overrides the default StatePool log directory.
# Meaning / 意义: Leave empty to use the module default path.
# Reference / 参考: Default empty.
log_dir: ""

# log_max_file_bytes / 单个日志文件上限
# Purpose / 作用: Maximum size of each log file before rollover or replacement.
# Meaning / 意义: Larger files keep longer continuous traces but are less convenient to inspect manually.
# Reference / 参考: Default 5242880 (5 MB).
log_max_file_bytes: 5242880

# stdout_fallback_when_log_fail / 日志失败时是否回退到 stdout
# Purpose / 作用: Prints critical log output to stdout if file logging fails.
# Meaning / 意义: This protects debugging visibility when paths or permissions are misconfigured.
# Reference / 参考: Default true.
stdout_fallback_when_log_fail: true
